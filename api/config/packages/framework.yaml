# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    trusted_proxies: '%env(TRUSTED_PROXIES)%'
    trusted_hosts: '%env(TRUSTED_HOSTS)%'
    # See https://caddyserver.com/docs/caddyfile/directives/reverse_proxy#headers
    trusted_headers: [ 'x-forwarded-for', 'x-forwarded-proto' ]

    # Note that the session will be started ONLY if you read or write from it.
    #session: true

    #esi: true
    #fragments: true

    # Rate limiters — protect public anonymous endpoints from abuse.
    rate_limiter:
        # Anonymous public photo upload on POST /race_medias :
        # 10 photos par utilisateur / heure. Keyed on the per-browser
        # XSRF-TOKEN cookie (already required by CSRF subscriber), so users
        # behind a shared NAT (event wifi) don't share a single bucket.
        public_media_upload:
            policy: 'sliding_window'
            limit: 10
            interval: '1 hour'

when@test:
    framework:
        test: true
        #session:
        #    storage_factory_id: session.storage.factory.mock_file
