name: Publish Docker Images

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize image name
        run: echo "IMAGE_NAME=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Build and push API (PHP/FrankenPHP)
        uses: docker/build-push-action@v6
        with:
          context: api
          file: api/Dockerfile
          target: frankenphp_prod
          push: true
          cache-from: type=gha,scope=api-${{ github.ref }}
          cache-to: type=gha,scope=api-${{ github.ref }},mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }}

      - name: Build and push PWA (Next.js)
        uses: docker/build-push-action@v6
        with:
          context: pwa
          file: pwa/Dockerfile
          target: prod
          push: true
          cache-from: type=gha,scope=pwa-${{ github.ref }}
          cache-to: type=gha,scope=pwa-${{ github.ref }},mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-pwa:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-pwa:${{ github.sha }}
