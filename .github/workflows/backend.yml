name: Backend CI

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'api/**'
      - 'compose.yaml'
      - 'compose.override.yaml'
      - '.github/workflows/backend.yml'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'api/**'
      - 'compose.yaml'
      - 'compose.override.yaml'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build Docker images
        uses: docker/bake-action@v6
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.override.yaml
          set: |
            php.cache-from=type=gha,scope=php-${{github.ref}}
            php.cache-from=type=gha,scope=php-refs/heads/main
            php.cache-to=type=gha,scope=php-${{github.ref}},mode=max
      -
        name: Start services
        run: docker compose up php --no-build --wait
      -
        name: Check HTTP reachability
        run: curl -v --fail-with-body http://localhost/docs -H "Accept:text/html"
      -
        name: Check HTTPS reachability
        run: curl -vk --fail-with-body https://localhost/docs -H "Accept:text/html"
      -
        name: Dump Docker logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color php
      -
        name: Drop existing test database
        run: docker compose exec -T php bin/console -e test doctrine:database:drop --force --if-exists
      -
        name: Create fresh test database
        run: docker compose exec -T php bin/console -e test doctrine:database:create
      -
        name: Run migrations on clean database
        run: docker compose exec -T php bin/console -e test doctrine:migrations:migrate --no-interaction
      -
        name: Doctrine Schema Validator
        run: docker compose exec -T php bin/console -e test doctrine:schema:validate --skip-sync
      -
        name: Doctrine Migrations Up-To-Date
        run: docker compose exec -T php bin/console -e test doctrine:migrations:up-to-date
      -
        name: Run PHP-CS-Fixer
        run: docker compose exec -T php vendor/bin/php-cs-fixer check --config=.php-cs-fixer.dist.php
      -
        name: Run PHPStan
        run: docker compose exec -T php vendor/bin/phpstan analyse --configuration=phpstan.dist.neon --memory-limit=512M
      -
        name: Run PHPUnit
        run: docker compose exec -T php bin/phpunit --no-coverage
