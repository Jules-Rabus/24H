name: Deploy

on:
  workflow_run:
    workflows: ['Publish Docker Images']
    types:
      - completed
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'workflow_run' &&
         github.event.workflow_run.conclusion == 'success' &&
         github.event.workflow_run.head_branch == 'main')
      }}
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
      IMAGE_API: ghcr.io/${{ github.repository_owner }}/24h-api
      IMAGE_PWA: ghcr.io/${{ github.repository_owner }}/24h-pwa

    steps:
      - name: Normalize image names
        run: |
          echo "IMAGE_API=$(echo $IMAGE_API | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "IMAGE_PWA=$(echo $IMAGE_PWA | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE_TAG,IMAGE_API,IMAGE_PWA
          script: |
            set -e
            echo "Deploying tag: ${IMAGE_TAG}"
            sudo kubectl set image deployment/24h-api api=${IMAGE_API}:${IMAGE_TAG}
            sudo kubectl set image deployment/24h-pwa pwa=${IMAGE_PWA}:${IMAGE_TAG}
            sudo kubectl rollout status deployment/24h-api --timeout=120s
            sudo kubectl rollout status deployment/24h-pwa --timeout=120s
            echo "Deploy complete."
