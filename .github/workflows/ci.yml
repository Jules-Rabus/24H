name: CI

on:
  push:
    branches:
      - main
  pull_request: ~
  workflow_dispatch: ~

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      -
        name: Build Docker images
        uses: docker/bake-action@v6
        with:
          pull: true
          load: true
          files: |
            compose.yaml
            compose.override.yaml
          set: |
            php.cache-from=type=gha,scope=php-${{github.ref}}
            php.cache-from=type=gha,scope=php-refs/heads/main
            php.cache-to=type=gha,scope=php-${{github.ref}},mode=max
            pwa.cache-from=type=gha,scope=pwa-${{github.ref}}
            pwa.cache-from=type=gha,scope=pwa-refs/heads/main
            pwa.cache-to=type=gha,scope=pwa-${{github.ref}},mode=max
      -
        name: Start services
        run: docker compose up php --no-build --wait
      -
        name: Check HTTP reachability
        run: curl -v --fail-with-body http://localhost
      -
        name: Check HTTPS reachability
        run: curl -vk --fail-with-body https://localhost
      -
        name: Dump Docker logs on failure
        if: failure()
        run: |
          docker compose ps
          docker compose logs --no-color php
      -
        name: Drop existing test database
        run: docker compose exec -T php bin/console -e test doctrine:database:drop --force --if-exists
      -
        name: Create fresh test database
        run: docker compose exec -T php bin/console -e test doctrine:database:create
      -
        name: Run migrations on clean database
        run: docker compose exec -T php bin/console -e test doctrine:migrations:migrate --no-interaction
      -
        name: Doctrine Schema Validator
        run: docker compose exec -T php bin/console -e test doctrine:schema:validate --skip-sync
      -
        name: Doctrine Migrations Up-To-Date
        run: docker compose exec -T php bin/console -e test doctrine:migrations:up-to-date
      -
        name: Run PHP-CS-Fixer
        run: docker compose exec -T php vendor/bin/php-cs-fixer check --config=.php-cs-fixer.dist.php
      -
        name: Run PHPStan
        run: docker compose exec -T php vendor/bin/phpstan analyse --configuration=phpstan.dist.neon --memory-limit=512M
      -
        name: Run PHPUnit
        run: docker compose exec -T php bin/phpunit --no-coverage

  pwa-quality:
    name: PWA Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pwa
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4
      -
        name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      -
        name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      -
        name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT
      -
        name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pwa/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-
      -
        name: Install dependencies
        run: pnpm install --frozen-lockfile
      -
        name: Type check
        run: pnpm run type-check
      -
        name: Format check
        run: pnpm run format:check
      -
        name: Lint
        run: pnpm run lint
      -
        name: Unit tests
        run: pnpm run test
      -
        name: Build
        run: pnpm run build
