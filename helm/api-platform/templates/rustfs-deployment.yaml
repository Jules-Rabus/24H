{{- if .Values.rustfs.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.rustfs.service.name }}
  labels:
    {{- include "api-platform.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.rustfs.service.name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.rustfs.service.name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: rustfs
          image: "{{ .Values.rustfs.image.repository }}:{{ .Values.rustfs.image.tag }}"
          imagePullPolicy: {{ .Values.rustfs.image.pullPolicy }}
          env:
            - name: RUSTFS_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "api-platform.fullname" . }}
                  key: s3-access-key
            - name: RUSTFS_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "api-platform.fullname" . }}
                  key: s3-secret-key
          args:
            - server
            - /data
            - --console-address
            - ":{{ .Values.rustfs.service.consolePort }}"
          ports:
            - name: s3
              containerPort: {{ .Values.rustfs.service.port }}
            - name: console
              containerPort: {{ .Values.rustfs.service.consolePort }}
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.rustfs.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.rustfs.service.name }}
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
