{{- if .Values.rustfs.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.rustfs.service.name }}
  labels:
    {{- include "api-platform.labels" . | nindent 4 }}
spec:
  ports:
    - name: s3
      port: {{ .Values.rustfs.service.port }}
      targetPort: s3
      protocol: TCP
    - name: console
      port: {{ .Values.rustfs.service.consolePort }}
      targetPort: console
      protocol: TCP
  selector:
    app.kubernetes.io/name: {{ .Values.rustfs.service.name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
